executive_questions:
  director:
  - question: What would your first 90 days look like in this role?
    answer_structure: Listen 30 days → Validate 30 days → Commit 30 days. Name 2-3 specific priorities from company brief.
    coaching_note: Crisp and specific. Reference actual company signals from Company Researcher brief. Show you've done real homework.
  - question: How do you think about building an AI product roadmap?
    answer_structure: User value validation → AI feasibility gate → trust/reliability threshold → data availability → staged rollout
    coaching_note: Reference your MTW experience building a real AI roadmap. Show you think in validated stages, not just features.
  - question: Where do you see AI taking this industry in the next 2-3 years?
    answer_structure: Current state → key inflection points → where this company is positioned → what it means for the PM role
    coaching_note: Show conviction. Specific predictions, not vague 'AI will transform everything.' Ground in real signals from company brief.
  - question: How do you handle pushback from senior stakeholders?
    answer_structure: Use SPAR — situation, data-driven decision, how you influenced, result
    maps_to_profile: story:mtw_agentic_deferral
  - question: What's your approach to cross-functional alignment on AI products?
    answer_structure: Show the PRD + user stories with acceptance criteria approach. Reference MTW cross-functional collaboration.
    maps_to_profile: bullets.mytravelwallet.responsibilities
  vp_cpo:
  - question: How do you think about scaling a PM function or team?
    answer_structure: Hiring signal → process codification → autonomy with alignment → metrics for PM performance
    coaching_note: 'Be honest: no people management experience. Bridge to: led cross-functional team of 15-20 at Blueprint, team of 5 PMs + 2 designers + 6 engineers at MTW fellowship.'
  - question: What's your framework for build vs. buy vs. partner decisions on AI capabilities?
    answer_structure: Core differentiator test → data advantage → cost/speed → vendor lock-in risk
    coaching_note: Reference MTW decision to use Claude API vs. build own LLM. Conscious architectural choice.
  - question: How do you balance innovation with execution quality in AI products?
    answer_structure: Show the v1/v2 discipline at MTW — ship v1 clean, instrument, validate, then build v2
    maps_to_profile: story:mtw_agentic_deferral
  ceo:
  - question: Why you over someone with 8+ years of PM experience?
    answer_structure: One crisp paragraph. Lead with shipped production AI product. End with conviction about the space.
    coaching_note: 'NEVER defensive. Confident framing: ''I ship AI products that work in production, not just prototypes.'' MTW evidence. In 2026, that''s rarer than years of title.'
  - question: What's your conviction about where this space is going?
    answer_structure: Specific prediction → evidence for it → what it means for this company → why you're excited
    coaching_note: Show genuine conviction. One or two specific bets, not a survey of all AI trends. Be willing to be wrong.
  - question: Why do you want this role specifically at this company?
    answer_structure: Something specific from company brief (AI signal, product direction, mission) + how it connects to your work
    coaching_note: Company brief is required for this question. Generic answer is a red flag at CEO level. Must reference specific company intelligence.
  - question: What would you do if the AI strategy you recommended didn't work?
    answer_structure: Define 'didn't work' → early signals → pivot vs. persevere framework → what you'd do differently
    coaching_note: Show maturity. The answer isn't 'I'd be right' — it's 'here's how I'd know early and what I'd do.'
