frameworks:
  product_sense:
    name: Dr. Nancy Li 7-Step Product Case Framework
    source: '[NL-M5]'
    use_when: product design / product sense / case interview questions
    steps:
    - step: 1
      name: Comprehend Situation
      what: Why are we solving this? Link to company mission, current situation, customer empathy.
    - step: 2
      name: Identify Customer
      what: Segment into 3+ non-overlapping groups. Always consider two-sided marketplace.
    - step: 3
      name: Cut & Prioritize Customer
      what: Score by Impact / Size of Market / Urgency. Pick one segment to focus on.
    - step: 4
      name: Report Customer Needs & Pain Points
      what: 1-3 specific pain points per customer. Pain points = what they don't have today.
    - step: 5
      name: List Solutions
      what: Exactly 3 solutions. One sentence each. Google REQUIRES moonshot idea.
    - step: 6
      name: Estimate Trade-offs
      what: Score by Effectiveness / Engineering Effort / Ease of Implementation / Risk. Say one corner case out loud.
    - step: 7
      name: Design the MVP
      what: Draw a wireframe.
    what_makes_you_stand_out:
    - Challenge the interviewer's numbers — 'Is 15% really good enough?'
    - Moonshot ideas — ONLY applicable to Google
    - Value chain scope — manufacturer, delivery, store, drinker — not just end users
    - One corner case only — 1% likelihood scenarios
    typical_mistakes:
    - Jumping to conclusion right away — you can know the answer, but don't say it immediately
    - Not linking back to company mission
    - Narrowing options too quickly
    - Not providing moonshot (Google only)
    - Using consultant case framework
    company_notes:
      google: MUST include moonshot idea. Moonshot = Huge Problem + Radical Solution + Breakthrough Technology. If not moonshot, can't join Google.
      facebook: Must link to Facebook mission. Structure and framework are important. They like to hear about FB mission.
      openai: 30 min interview. Technology-forward, ambitious ideas expected.
  metrics_mycspchd:
    name: MYCSPCHD — Product Metrics Framework
    source: '[NL-M6]'
    use_when: define success metrics / what metrics would you measure / how do you measure success questions
    steps:
      M: Mission — start by linking to company mission
      Y: Why — why does this product exist / why does this metric matter
      C: Customer — who are the customers
      S: Segmentation — segment customers (usually two-sided marketplace)
      P: Priority — identify North Star metric (one key measurement per user type)
      H: Health — product health metrics (engagement, active users, technical uptime)
      C2: Cannibalization — what other products does this impact negatively
      D: De-risk — counter metrics + user risks (ethical, abuse, misuse)
    north_star_guidance: Select one from Mission metrics AND one from Product Health metrics. Define 'active' early in the answer.
    counter_metrics: 'A metric to prevent over-emphasizing the North Star while losing sight of the mission. Example: North Star is MAU, counter metric is feature usage.'
    what_makes_you_stand_out:
    - Call out both sides of the marketplace
    - Define product-unique metrics, not just 'daily active users'
    - Define 'active' early
    - Call out counter metrics
    - Mention cannibalization
    - Challenge the data they give you
    - Get ready for the size discussion
  diagnostic_cpte:
    name: CPTE — Metric Drop Diagnostic Framework
    source: '[NL-M6]'
    use_when: metric dropped / something went wrong / investigate a decline questions
    steps:
      C: Customer — customer behavior change, intent change, segment shift
      P: Product — product change, new feature, bug, A/B test
      T: Technology — infrastructure failure, third-party dependency, performance issue
      E: External — competitor launch, seasonality, regulatory change, market shift
    process:
    - 1. Define the metric precisely (e.g., define 'daily active user')
    - 2. Identify the user flow/steps
    - 3. Apply CPTE at each step — what could go wrong here?
    - 4. What would you do to fix the most likely cause?
    - 5. What data would you collect from the data scientist?
  ai_product_design:
    name: AI Product Design Framework
    source: '[NL-W11]'
    use_when: design/build a specific AI system — fraud detection, recommendation engine, chatbot, ranking system
    steps:
    - 1. State assumptions, goals, available data/information/resources (GUCCI)
    - '2. Define AI input: data pipeline and data type'
    - 3. Define AI output
    - 4. Define success metrics
    - 5. Select AI models (ONLY after steps 1-4 are defined)
    - 6. Business logic related to the product
    - 7. AI ethics consideration
    critical_rule: Only after Input, Output, and metrics are clearly defined — choose your AI models. Never start with model selection.
    tips:
    - Confirm assumptions with interviewer before proceeding
    - Only talk about top 3 challenges — listing all will scare interviewers
    - Paint a bigger picture — show scale thinking
    - Use GUCCI for problem definition
  ai_product_lifecycle:
    name: AI Product Creation Lifecycle
    source: '[NL-W11]'
    use_when: how would you create/build/launch an AI product from scratch questions
    stages:
    - Problem Definition (GUCCI)
    - AI Hypothesis
    - Data Strategy
    - AI PoC
    - Validate Inputs/Outputs with customers
    - Discover/Validate AI enabler features & AI User Journey
    - Validated AI features → Product MVP → AI Product-Market Fit
    - Scale and Generalization strategy
    - Scale → Dominate Market → Exploit data advantage
    behavioral_answer_structure:
      pre_launch: Market research to understand user needs. Set clear KPIs and definition of success aligned across stakeholders. Risk assessment and mitigation. Ethical considerations — bias testing, data
        privacy.
      launch: Soft launch with beta testing to gather real-world feedback. Marketing coordination. Smooth rollout, monitoring performance and errors.
      post_launch: Continuously monitor against KPIs. Gather user feedback. Refine model, expand knowledge base. Open feedback loop with users guides ongoing updates.
  clarifying_questions:
    name: Top 10 Clarifying Questions — 4 Groups
    source: '[NL-M5]'
    use_when: Opening any product design / sense / case interview question
    groups:
      group_1:
        name: Understand the product
        use_when: You don't know the product or have no experience using it
        examples:
        - Sorry, I don't have much knowledge about Product A — can you tell me more about it?
        - What is Product A? How does it work?
      group_2:
        name: Why questions
        use_when: After showing customer empathy, explore why this problem is important
        rule: FIRST show why YOU think this is an important problem — THEN ask the interviewer to confirm
      group_3:
        name: Scoping questions
        use_when: Understand the scope and boundaries of the problem
        examples:
        - Is this for all campuses or just headquarters?
        - Does it include international locations?
      group_4:
        name: Challenge the interviewer
        use_when: If you hear anything bizarre, questionable, or too specific
        examples:
        - Why shall we set 15% as the target? Sounds pretty low to me.
        - Is 15% the industry standard?
  ab_testing:
    name: A/B Testing Framework
    source: '[NL-M6]'
    use_when: A/B testing / experimentation design questions
    key_points:
    - Define Control Group vs Variation Group
    - Work with data scientist to decide sample size (100-1000)
    - 'Define significance level: 80%'
    - State which metric you are optimizing
    - Run for statistically significant duration
  behavioral_spar:
    name: SPAR — Behavioral Interview Framework
    source: '[NL-M5] + [LL]'
    use_when: behavioral questions — tell me about a time...
    structure:
      S: Situation — set brief context
      P: Problem — specific challenge or decision
      A: Action — what YOU specifically did (use I not we)
      R: Result — measurable outcome
    rules:
    - Always use 'I' not 'we' when describing actions
    - Result must be measurable where possible
    - Keep S/P brief — spend most time on A and R
    - For CEO/CTO/Director level — crisp strategic paragraph, NOT full SPAR structure
  digs_method:
    name: DIGS Method — Behavioral Framework
    source: '[LL] Lewis Lin — Decode and Conquer'
    use_when: behavioral questions, especially conflict/influence/leadership scenarios
    structure:
      D: Dilemma — what was the difficult situation or conflict
      I: Instigator — what caused or triggered the situation
      G: Growing edge — what skill or growth was required/demonstrated
      S: Solution — what you did and the result
ai_pm_metrics:
  chatbot_and_ai_product:
    source: '[NL-W11]'
    categories:
    - name: User Engagement
      metrics:
      - conversation length
      - session duration
      - return rate
      - DAU/WAU/MAU
    - name: User Satisfaction
      metrics:
      - CSAT (1-5 scale)
      - NPS (0-10 scale)
      - sentiment score (-1 to +1)
    - name: Task Completion Rate
      metrics:
      - '% conversations where user successfully completes intended task'
      - Goal Alignment Rate
    - name: Interaction Quality
      metrics:
      - response time (seconds)
      - accuracy rate
      - handoff rate
      - First-Contact Resolution (FCR)
      - conversation drop-off rate
    - name: Model Quality
      metrics:
      - precision
      - recall
      - F1 score
      - scalability
      - ROI
      - speed
      - data drift rate
    - name: Product Health
      metrics:
      - uptime
      - error rate
      - hallucination fallback rate
      - context maintenance rate
  ml_model_accuracy:
    source: '[NL-W11] + [NL-QB]'
    approach:
    - Define accuracy by prioritizing BUSINESS metrics, not technical metrics alone
    - 'Choose metric based on cost of error: high false-positive cost → prioritize precision. High false-negative cost → prioritize recall.'
    - Monitor and address data drift continuously post-deployment
    - Leverage new data and deploy pipelines automatically (MLOps)
    precision_vs_recall: Precision = minimize false positives (fraud detection, financial). Recall = minimize false negatives (medical diagnosis, safety).
question_bank:
  ai_specific:
  - id: AI-001
    question: Talk about the process of launching your LLM chatbot.
    category: behavioral_ai
    likelihood: high
    source: '[NL-QB] Real interview — behavioral'
    framework: ai_product_lifecycle
    maps_to_profile: products_shipped.mytravelwallet
    answer_structure: pre_launch / launch / post_launch
    coaching_note: 'Name MyTravelWallet and Zoe specifically. Lead with the architectural decision (deterministic boundary). Include real numbers: 8/10 CSAT, 400+ fixes, 50+ beta subscribers.'
    time_budget_minutes: 3-5 min
    anticipated_followups:
    - What was the biggest technical challenge during the launch?
    - How did you measure success post-launch?
    - What would you do differently if you launched it again?
  - id: AI-002
    question: What metrics did you measure with your LLM chatbot? Were you able to sustain those metrics over time?
    category: behavioral_ai
    likelihood: high
    source: '[NL-QB] Real interview — behavioral'
    framework: ai_pm_metrics.chatbot_and_ai_product
    maps_to_profile: bullets.mytravelwallet.responsibilities
    answer_structure: engagement → satisfaction (8/10 CSAT) → task completion → interaction quality → model quality
    time_budget_minutes: 3-5 min
    anticipated_followups:
    - How did those metrics change over time?
    - Which metric surprised you most?
    - How did you handle when a metric dropped unexpectedly?
  - id: AI-003
    question: How do you measure the accuracy of your ML models and how do you improve it?
    category: behavioral_ai
    likelihood: high
    source: '[NL-QB] Real interview — behavioral'
    framework: ai_pm_metrics.ml_model_accuracy
    maps_to_profile: bullets.mytravelwallet.achievements[0]
    answer_structure: align to business metrics → choose precision vs recall based on error cost → monitor data drift → automate pipeline
    time_budget_minutes: 3-5 min
    anticipated_followups:
    - What was your approach when the model's accuracy degraded post-launch?
    - How did you balance precision vs recall in your product context?
    - How did you communicate model quality to non-technical stakeholders?
  - id: AI-004
    question: For a FinTech company — Build a fraud waste and abuse detection system for payers.
    category: ai_product_design_case
    likelihood: likely
    source: '[NL-QB] Real interview — FinTech company'
    framework: ai_product_design
    maps_to_profile: null
    answer_structure: assumptions (success definition + data access) → AI output (boolean classifier, <5 sec) → AI input (location, transaction history, time, method) → metrics (99.9% precision, recall
      >10%) → filter layer first → model (Random Forest / Neural Net / XGBoost)
    time_budget_minutes: 15-20 min
    anticipated_followups:
    - What edge cases would your fraud system miss?
    - How would you handle false positives at scale?
    - How would you retrain the model as fraud patterns evolve?
  - id: AI-005
    question: For an eCommerce company — How can we integrate GenAI technologies in our processes? Provide examples.
    category: ai_product_design_case
    likelihood: likely
    source: '[NL-QB] Real interview — eCommerce company (email + content generation)'
    framework: ai_product_lifecycle
    maps_to_profile: products_shipped.mytravelwallet.key_decisions
    answer_structure: identify use cases (email personalization, content generation, support, churn prediction) → prioritize by impact → define input/output → success metrics → tools available
    time_budget_minutes: 10-15 min
    anticipated_followups:
    - How would you prioritize which GenAI use case to build first?
    - What's the biggest risk of GenAI in an eCommerce context?
    - How do you measure ROI on a GenAI integration?
  - id: AI-006
    question: For an eCommerce company — How can we be more predictive in identifying customer churn?
    category: ai_product_design_case
    likelihood: likely
    source: '[NL-QB] Real interview — eCommerce company'
    framework: ai_product_design
    maps_to_profile: null
    answer_structure: structured + unstructured data → classical ML (neural net, SVM) for behavioral patterns → GenAI for sentiment/reviews → combine for robust churn model → feedback loop
    time_budget_minutes: 10-15 min
    anticipated_followups:
    - How early can you predict churn before the customer actually churns?
    - What intervention would you trigger when churn is predicted?
    - How do you avoid false positives disrupting healthy customers?
  - id: AI-007
    question: For a marketplace — Build a ranking algorithm to recommend dishes to customers.
    category: ai_product_design_case
    likelihood: likely
    source: '[NL-QB] Real interview — marketplace org (thought process, not technical skills)'
    framework: ai_product_design
    maps_to_profile: null
    answer_structure: objective (align preferences + sales) → assumptions → success criteria (CTR, conversion, retention) → inputs (customer data, dish data, contextual data) → hybrid approach (collaborative
      + content-based + contextual bandits) → business logic → ethical considerations
    time_budget_minutes: 15-20 min
    anticipated_followups:
    - How would you handle the cold start problem for new users?
    - How would you avoid a filter bubble where users only see familiar dishes?
    - How do you balance vendor goals with user preferences?
  - id: AI-008
    question: For a social media company — How would you build a chatbot in-house without using LLMs?
    category: ai_product_design_case
    likelihood: possible
    source: '[NL-QB] Real interview — social media company'
    framework: ai_product_design
    maps_to_profile: null
    answer_structure: define purpose → open-source models → DialogFlow or similar framework → edge computing deployment → model distillation (e.g., Microsoft Phi-3) for cost/performance
    time_budget_minutes: 10-15 min
    anticipated_followups:
    - What are the limitations vs LLM-based chatbots?
    - When would you choose this approach over an LLM?
    - How would you handle out-of-scope user queries?
  - id: AI-009
    question: How will you ensure trust and safety in our products?
    category: ai_product_design_case
    likelihood: likely
    source: '[NL-QB] Real interview — Snapchat GPM mock'
    framework: ai_product_design
    maps_to_profile: bullets.mytravelwallet.responsibilities
    answer_structure: proactive AI-driven moderation → user privacy protection → user education → robust reporting mechanisms → regular audits and protocol updates
    time_budget_minutes: 8-12 min
    anticipated_followups:
    - How do you balance safety with not over-moderating legitimate content?
    - How would you measure the effectiveness of your safety system?
    - What's your approach to trust and safety in a GenAI product specifically?
  - id: AI-010
    question: How do you measure or define conversation quality?
    category: behavioral_ai
    likelihood: likely
    source: '[NL-QB] Real interview — Snapchat GPM mock'
    framework: ai_pm_metrics.chatbot_and_ai_product
    maps_to_profile: bullets.mytravelwallet.responsibilities
    answer_structure: user satisfaction (CSAT/NPS/sentiment) → resolution effectiveness (FCR) → engagement and flow (interaction length, drop-off) → task completion → response quality → personalization
      rate
    time_budget_minutes: 8-12 min
    anticipated_followups:
    - Which single metric would you optimize if you could only pick one?
    - How do you measure quality for open-ended vs task-specific conversations?
    - What's the hardest conversation quality problem you've faced?
  - id: AI-011
    question: Can you describe your experience designing AI-powered products?
    category: behavioral_ai
    likelihood: high
    source: '[NL-QB]'
    framework: ai_product_lifecycle
    maps_to_profile: products_shipped.mytravelwallet
    answer_structure: name the product → problem it solved → key architectural decision → metrics → outcome
    time_budget_minutes: 3-5 min
    anticipated_followups:
    - What was the hardest AI decision you made during that product?
    - How did you validate that the AI was actually adding value vs just being a feature?
  - id: AI-012
    question: How do you ensure the AI product you're managing is ethically designed and used?
    category: behavioral_ai
    likelihood: likely
    source: '[NL-QB]'
    framework: ai_product_design
    maps_to_profile: bullets.mytravelwallet.responsibilities
    answer_structure: define ethical boundaries upfront → observability at AI/rules boundary → bias testing → user transparency → ongoing monitoring
    time_budget_minutes: 3-5 min
    anticipated_followups:
    - How do you handle it when ethics and business goals are in tension?
    - What specific bias risks did you design against?
    - How do you communicate AI risk to non-technical leadership?
  - id: AI-013
    question: Explain the data pipeline for the last AI project you worked on. What were the top challenges in getting data, and how did you resolve them?
    category: behavioral_ai
    likelihood: high
    source: '[NL-QB]'
    framework: null
    maps_to_profile: products_shipped.mytravelwallet
    answer_structure: describe the pipeline (SerpAPI + Seats.aero → Supabase vector DB → RAG → Claude API) → challenge (hallucination risk with financial data) → resolution (deterministic math boundary,
      LLM scoped to natural language only)
    time_budget_minutes: 5-8 min
    anticipated_followups:
    - How did you handle data quality issues?
    - What would you instrument differently knowing what you know now?
    - How did the pipeline evolve from PoC to production?
