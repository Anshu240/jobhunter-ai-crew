    source: '[NL-QB]'
    framework: behavioral_spar
    maps_to_profile: story:mtw_agentic_deferral
    answer_structure: user value → AI feasibility → trust/reliability threshold → data availability → deferral logic (use MTW v2 agentic deferral story)
    time_budget_minutes: 3-5 min
