technical_concepts:
  rag_pipeline:
    what_it_is: Retrieval-Augmented Generation — LLM combined with a retrieval system (vector database) to ground responses in real data, reducing hallucination
    your_experience: products_shipped.mytravelwallet
    gap_type: none
    your_answer: 'Built production RAG pipeline at MyTravelWallet. Loyalty program data embedded in Supabase vector DB. Query retrieves relevant reward program info, passes to Claude as context for natural
      language explanation. Key architectural decision: scoped LLM to explanation only, kept all financial calculations deterministic.'
    key_points:
    - Embedding model converts documents to vectors stored in vector DB
    - Query retrieves relevant chunks, passes to LLM as grounded context
    - Reduces hallucination by anchoring LLM output to retrieved facts
  hallucination_guardrails:
    what_it_is: Mechanisms to detect and prevent AI models from generating false or unsupported information
    your_experience: bullets.mytravelwallet.achievements[0]
    gap_type: none
    your_answer: 'Designed three-layer AI observability at MyTravelWallet: (1) input integrity monitoring, (2) LLM output evaluation, (3) post-decision quality monitoring. Core architectural decision: LLM
      scoped strictly to natural language explanation — all financial calculations run deterministically. Placed observability instrumentation at the AI/rules boundary.'
  agentic_ai:
    what_it_is: AI systems that can take multi-step actions autonomously — tool calling, memory management, planning, and execution toward a goal
    your_experience: bullets.mytravelwallet.responsibilities[5]
    gap_type: none
    your_answer: Scoped v2 agentic layer for Zoe at MyTravelWallet. Defined tool-calling interfaces, memory management boundaries, output validation checkpoints, and execution isolation requirements. Deliberately
      deferred build until v1 user data validated trigger patterns.
  prompt_engineering:
    what_it_is: Systematic design of prompts to reliably elicit desired LLM behavior — system prompts, few-shot examples, chain-of-thought, structured output
    your_experience: products_shipped.mytravelwallet
    gap_type: none
    your_answer: Used throughout MyTravelWallet — system prompts for Zoe's conversational behavior, structured output prompts for verdict generation, hallucination prevention constraints in prompt design.
  vector_database:
    what_it_is: Database optimized for storing and querying high-dimensional vectors (embeddings) — enables semantic similarity search
    your_experience: products_shipped.mytravelwallet.stack
    gap_type: none
    your_answer: Used Supabase with pgvector extension as vector store in MyTravelWallet RAG pipeline.
  llm_evaluation:
    what_it_is: Methods to assess LLM output quality — faithfulness, answer relevance, context precision, context recall, toxicity, latency
    your_experience: bullets.mytravelwallet.responsibilities
    gap_type: soft_gap
    concept: 'Key evaluation dimensions: faithfulness (does output match source?), answer relevance (does it answer the question?), context precision (is retrieved context relevant?), context recall (is
      enough context retrieved?)'
    bridge_answer: Built AI observability instrumentation at MyTravelWallet monitoring verdict outcomes, hallucination fallback rates, and user trust signals. Designed three-layer quality monitoring. Adjacent
      to formal LLM eval frameworks like RAGAS. No direct experience with evaluation libraries.
  data_drift:
    what_it_is: Change in statistical properties of model inputs over time, causing model performance to degrade — covariate drift, label drift, concept drift
    your_experience: null
    gap_type: soft_gap
    concept: Monitor input distributions post-deployment. Compare to training data distributions. Retrain or fine-tune when significant drift detected. MLOps pipelines automate detection.
    bridge_answer: Designed AI observability at MyTravelWallet to monitor verdict outcome distributions over time — same underlying principle as data drift monitoring. No hands-on experience with formal
      drift detection tooling.
  fine_tuning:
    what_it_is: Training a pre-trained model on domain-specific labeled data to improve performance for a specific use case — full fine-tuning vs PEFT (LoRA, QLoRA)
    your_experience: null
    gap_type: soft_gap
    concept: 'Full fine-tuning updates all model weights. PEFT (LoRA) updates small adapter layers — cheaper, less catastrophic forgetting. Requires labeled training data. Trade-off: performance vs cost
      vs maintenance burden.'
    bridge_answer: 'Made a deliberate architectural decision at MyTravelWallet to use RAG + prompt engineering instead of fine-tuning — lower complexity, lower cost, easier to update. Understand the trade-off:
      fine-tuning for stable domain knowledge, RAG for dynamic/fresh data.'
  mlops:
    what_it_is: Practices for deploying and maintaining ML models in production — CI/CD for ML, automated training pipelines, model versioning, monitoring, rollback
    your_experience: null
    gap_type: soft_gap
    concept: 'Key components: data pipeline automation, model training automation, model registry, deployment pipelines, monitoring dashboards, alerting on drift/degradation'
    bridge_answer: Managed AI product lifecycle at MyTravelWallet from PoC to production — understand what MLOps solves from a PM perspective. No hands-on experience with MLOps tooling (Kubeflow, MLflow,
      SageMaker Pipelines). Gap acknowledged.
  aws_sagemaker:
    what_it_is: AWS managed ML platform — SageMaker Studio (IDE), Training Jobs, Endpoints (real-time inference), Model Monitor (drift detection), Pipelines (MLOps automation)
    your_experience: null
    gap_type: hard_gap
    concept: End-to-end ML lifecycle on AWS. Training → registry → deployment → monitoring. Integrates with S3 for data, CloudWatch for monitoring, IAM for permissions.
    bridge_answer: 'Hard gap — no direct SageMaker experience. Lead with production AI experience: Claude API + FastAPI + Supabase + Vercel stack in production. Acknowledge the gap directly and honestly.
      Note: understand the principles behind managed ML platforms — the ''what'' and ''why'', not the ''how'' hands-on.'
  aws_bedrock:
    what_it_is: AWS managed service for foundation models — access Claude, Llama, Titan via API without managing infrastructure. Supports RAG via Knowledge Bases, agents via Agents for Bedrock.
    your_experience: null
    gap_type: hard_gap
    concept: Fully managed foundation model API. Knowledge Bases for RAG. Agents for multi-step workflows. Model evaluation built in.
    bridge_answer: Hard gap — no direct Bedrock experience. Lead with Claude API experience (direct Anthropic API, not via AWS). Architecture patterns are equivalent — same RAG and agentic concepts. Gap
      is tooling-specific, not conceptual.
  transformer_architecture:
    what_it_is: Neural network architecture underlying most modern LLMs — attention mechanism, self-attention, encoder-decoder structure
    your_experience: null
    gap_type: soft_gap
    concept: 'Attention mechanism: each token attends to all other tokens. Self-attention: model learns which tokens are relevant to each other. Transformer = multiple attention layers + feed-forward layers.'
    bridge_answer: 'Conceptual understanding from building LLM-powered products. No hands-on model architecture experience. PM-level knowledge: understand what transformers enable (long-range dependencies,
      parallel training) and their limitations (context window, compute cost, latency).'
