crewai_portfolio_questions:
  _note: Questions specifically about JobHunter AI Crew — anticipated once you showcase this on your portfolio and in interviews.
  architecture_questions:
  - question: Walk me through the architecture of your multi-agent system.
    category: technical_portfolio
    likelihood: high
    time_budget_minutes: 5-8 min
    answer_structure: 7 agents, each with a single responsibility. Job Analyst parses JDs → Profile Builder builds candidate profile → Fit Scorer weights match → Presenter renders the HTML report → Resume
      Strategist produces targeted rewrites → Company Researcher searches 5 platforms → Interview Prep Coach maps questions to real stories. Orchestrator ties them together. Each agent has a behavioral
      spec before any code was written.
    anticipated_followups:
    - How do agents communicate with each other?
    - What happens when one agent fails mid-pipeline?
    - Why 7 agents vs fewer with broader scope?
  - question: Why did you choose CrewAI vs building with the raw Anthropic SDK directly?
    category: technical_portfolio
    likelihood: high
    time_budget_minutes: 3-5 min
    answer_structure: 'Honest answer: v1 actually uses the raw Anthropic SDK with messages.parse for structured output, NOT CrewAI orchestration. The architecture decision: CrewAI adds orchestration patterns
      on top of the SDK, which is valuable for agent-to-agent communication and state management at scale. For v1, each agent is a standalone Python module with clean input/output contracts — the orchestrator
      (run_pipeline.py) handles sequencing. CrewAI becomes more valuable when agents need to spawn sub-agents or when the communication graph gets complex.'
    anticipated_followups:
    - What would make you switch to a fully CrewAI-orchestrated architecture?
    - How do you handle agent state between calls?
    - What are the tradeoffs of stateless vs stateful agents?
  - question: How do you handle agent failure in your pipeline?
    category: technical_portfolio
    likelihood: high
    time_budget_minutes: 3-5 min
    answer_structure: 'Each agent raises a typed exception (e.g. JobAnalystError, FitScorersError). Every agent has a status field: ok / partial / rejected. Partial means something was found but coverage
      is thin — downstream agents still run with degraded input. Rejected means a hard dependency was missing — orchestrator catches the exception and stops that branch gracefully. The pipeline never silently
      fails — every gap is flagged in warnings fields.'
    anticipated_followups:
    - How do you distinguish a recoverable failure from a fatal one?
    - What does the orchestrator do when the Company Researcher fails?
    - How do you surface failures to the user without overwhelming them?
  - question: What is your eval approach for the agents?
    category: technical_portfolio
    likelihood: high
    time_budget_minutes: 5-8 min
    answer_structure: 'Two eval layers: (1) Deterministic checks — the cardinal sin validators. Job Analyst: parse_warnings catch JD ambiguity. Fit Scorer: arithmetic is all code. Resume Strategist: post-generation
      validator checks every number against source. (2) End-to-end quality checks — run the pipeline on 5-10 real JDs and manually evaluate: does the prep pack actually help in a mock interview? Does the
      fit score match my human judgment? Does the resume strategist catch gaps? Evals are designed after a real end-to-end run — not written blind.'
    anticipated_followups:
    - How do you measure the quality of the Interview Prep Coach specifically?
    - What does a passing eval look like for the Fit Scorer?
    - How would you automate these evals at scale?
  - question: How do you prevent hallucination across the agents?
    category: technical_portfolio
    likelihood: high
    time_budget_minutes: 3-5 min
    answer_structure: Three-layer strategy mirroring what we built at MyTravelWallet. 1. LLM boundary design — agents with cardinal sins (numbers, company facts, candidate experience) never trust LLM for
      those facts. Code owns math. 2. Source grounding — Resume Strategist only rewrites from profile.yaml entries, source field is mandatory. Company Researcher only states what has a source URL. 3. Post-generation
      validation — numeric validator in Resume Strategist checks every rewritten number against its cited source. Same principle as production RAG guardrails.
    anticipated_followups:
    - What hallucination failure mode are you most worried about that you haven't solved?
    - How do you validate the Company Researcher isn't using training data?
    - How does this compare to your approach at MyTravelWallet?
  - question: What would you do differently if you rebuilt this from scratch?
    category: technical_portfolio
    likelihood: likely
    time_budget_minutes: 3-5 min
    answer_structure: 'Three things: (1) Named story IDs from day one instead of positional indices — index drift was a real bug I caught late. (2) Split knowledge_base.yaml into smaller files earlier —
      it grew to 25K+ tokens and the context builder has to filter aggressively on every run. (3) Design evals before shipping agents, not after — I specced the agents thoroughly but the eval harness is
      still pending. The behavioral spec process (interview-first before code) is the one thing I''d keep exactly.'
    anticipated_followups:
    - What was the hardest agent to spec?
    - How long did it take to build the full crew?
    - What PM skill transferred most directly to building an agentic system?
  pm_judgment_questions:
  - question: Why did you build this for yourself vs using an existing tool like Teal or Rezi?
    category: technical_portfolio
    likelihood: high
    time_budget_minutes: 2-3 min
    answer_structure: Existing tools do generic resume rewriting without grounding — they invent metrics. They can't map a JD signal to my specific story about deferring agentic v2. They don't know that
      MyTravelWallet's deterministic boundary is the exact answer to "how do you handle hallucination risk in financial products?" The differentiation is provability — every claim traces to something real
      I did. That's a PM problem, not a writing problem. So I built the PM solution.
    anticipated_followups:
    - How would you productize this for other PMs?
    - What would be your pricing model?
    - What is the biggest technical risk if you scaled this to 1000 users?
  - question: What was your decision to scope to 7 agents vs more or fewer?
    category: technical_portfolio
    likelihood: likely
    time_budget_minutes: 3-5 min
    answer_structure: '7 agents = 7 distinct responsibilities that don''t overlap. The forcing question was: can each agent be replaced independently without changing the others? Yes — swap SerpAPI for
      a different search tool in Company Researcher, Job Analyst still works the same. Scope creep risk: Interview Prep Coach started as a question generator and grew to include technical routing, executive
      prep, and follow-up questions. Managed it by speccing before building — the behavioral spec interview process caught scope expansion before it became code complexity.'
    anticipated_followups: []
